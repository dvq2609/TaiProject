<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống đang bảo trì - VƯƠN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a34a;
            --primary-hover: #15803d;
            --dark: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: var(--dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 1rem;
        }
        .container {
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 3rem 2rem;
            border-radius: 2rem;
            border: 1px solid rgba(22, 163, 74, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.1);
        }
        .icon {
            font-size: 2.5rem;
            animation: spin 3s infinite linear;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 1rem;
            color: var(--dark);
        }
        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #dcfce7;
            color: #15803d;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }
        .footer-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(22, 163, 74, 0.1);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <span class="icon">🌱</span>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            Đang nâng cấp hệ thống
        </div>
        <h1>Hệ thống đang bảo trì</h1>
        <p>Ứng dụng VƯƠN đang được cập nhật các tính năng tư vấn AI mới và tối ưu trải nghiệm giỏ hàng tốt hơn cho khách hàng. Hệ thống sẽ sớm hoạt động trở lại. Cảm ơn sự kiên nhẫn của bạn!</p>
        <div class="footer-text">
            Mọi thắc mắc vui lòng gửi về hòm thư hỗ trợ: <b>Vuon@gmail.com</b>
        </div>
    </div>
</body>
</html>
