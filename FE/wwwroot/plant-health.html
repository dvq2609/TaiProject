<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sức khỏe cây trồng - VƯƠN</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .health-card { background:#fff; border-radius:.75rem; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:1.25rem; margin-bottom:1rem; }
    .health-bar { height:10px; background:#e5e7eb; border-radius:5px; overflow:hidden; margin:.5rem 0; }
    .health-fill { height:100%; border-radius:5px; transition:width .8s; }
    .plant-selector { display:flex; gap:.5rem; overflow-x:auto; padding:.5rem 0; margin-bottom:1.5rem; }
    .plant-chip { flex-shrink:0; padding:.5rem 1rem; border:1px solid #e5e7eb; border-radius:2rem; background:#fff; cursor:pointer; font-size:.875rem; white-space:nowrap; transition:all .2s; }
    .plant-chip.active { border-color:#16a34a; background:#f0fdf4; color:#16a34a; font-weight:500; }
    .metric-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.75rem; margin-bottom:1rem; }
    .metric-box { background:#f9fafb; border-radius:.5rem; padding:.75rem; text-align:center; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <div class="page-content" style="max-width:700px;">
    <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:.5rem;">Sức khỏe cây trồng</h1>
    <p style="color:#6b7280;margin-bottom:1.5rem;">Theo dõi tình trạng từng chậu cây của bạn</p>

    <div class="plant-selector" id="plant-chips"></div>
    <div id="health-detail"></div>
  </div>
  <div id="mobile-nav"></div>
  <footer id="site-footer"></footer>
  <script src="assets/common.js"></script>
  <script>
    const MY_PLANTS = [
      { name:'Cà chua bi', emoji:'🍅', health:85, water:72, light:90, growth:'Bình thường', lastWatered:'Hôm nay, 7:00', issue:'Không có vấn đề', status:'good' },
      { name:'Rau cải xanh', emoji:'🥬', health:60, water:40, light:80, growth:'Chậm', lastWatered:'Hôm qua, 18:00', issue:'Thiếu nước, cần tưới thêm', status:'warning' },
      { name:'Hoa hồng', emoji:'🌹', health:92, water:88, light:95, growth:'Tốt', lastWatered:'Hôm nay, 6:30', issue:'Phát hiện 1 lá vàng nhẹ', status:'good' },
      { name:'Húng quế', emoji:'🌿', health:45, water:30, light:60, growth:'Rất chậm', lastWatered:'3 ngày trước', issue:'Thiếu nước nghiêm trọng, thiếu ánh sáng', status:'danger' }
    ];
    let currentIdx = 0;

    function renderChips() {
      document.getElementById('plant-chips').innerHTML = MY_PLANTS.map((p,i)=>`
        <button class="plant-chip ${i===0?'active':''}" onclick="showPlant(${i},this)">${p.emoji} ${p.name}</button>`).join('');
    }

    function showPlant(i, btn) {
      document.querySelectorAll('.plant-chip').forEach(c=>c.classList.remove('active'));
      if(btn) btn.classList.add('active');
      currentIdx = i;
      const p = MY_PLANTS[i];
      const statusColor = p.status==='good'?'#16a34a':p.status==='warning'?'#f59e0b':'#ef4444';
      const statusText = p.status==='good'?'Khỏe mạnh':p.status==='warning'?'Cần chú ý':'Nguy hiểm';

      document.getElementById('health-detail').innerHTML = `
        <div class="health-card">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;">
            <span style="font-size:3rem;">${p.emoji}</span>
            <div style="flex:1;">
              <h2 style="font-size:1.25rem;font-weight:700;">${p.name}</h2>
              <span style="display:inline-block;padding:.25rem .75rem;border-radius:1rem;background:${statusColor}20;color:${statusColor};font-size:.8rem;font-weight:500;">${statusText}</span>
            </div>
            <div style="text-align:right;">
              <div style="font-size:2rem;font-weight:700;color:${statusColor};">${p.health}%</div>
              <div style="font-size:.75rem;color:#6b7280;">Chỉ số sức khỏe</div>
            </div>
          </div>

          <div class="metric-grid">
            <div class="metric-box">
              <div style="font-size:1.25rem;">💧</div>
              <div style="font-size:.75rem;color:#6b7280;">Độ ẩm</div>
              <div style="font-weight:700;color:#2563eb;">${p.water}%</div>
              <div class="health-bar"><div class="health-fill" style="width:${p.water}%;background:#3b82f6;"></div></div>
            </div>
            <div class="metric-box">
              <div style="font-size:1.25rem;">☀️</div>
              <div style="font-size:.75rem;color:#6b7280;">Ánh sáng</div>
              <div style="font-weight:700;color:#f59e0b;">${p.light}%</div>
              <div class="health-bar"><div class="health-fill" style="width:${p.light}%;background:#f59e0b;"></div></div>
            </div>
            <div class="metric-box">
              <div style="font-size:1.25rem;">📈</div>
              <div style="font-size:.75rem;color:#6b7280;">Tốc độ tăng trưởng</div>
              <div style="font-weight:600;font-size:.875rem;color:#374151;">${p.growth}</div>
            </div>
            <div class="metric-box">
              <div style="font-size:1.25rem;">⏰</div>
              <div style="font-size:.75rem;color:#6b7280;">Tưới gần nhất</div>
              <div style="font-weight:600;font-size:.8rem;color:#374151;">${p.lastWatered}</div>
            </div>
          </div>

          <div style="background:${p.status==='good'?'#f0fdf4':p.status==='warning'?'#fffbeb':'#fef2f2'};border-radius:.5rem;padding:1rem;">
            <p style="font-size:.875rem;font-weight:600;color:${statusColor};">
              ${p.status==='good'?'✅':'⚠️'} Tình trạng:
            </p>
            <p style="font-size:.875rem;color:#374151;margin-top:.25rem;">${p.issue}</p>
          </div>

          <div style="display:flex;gap:.75rem;margin-top:1rem;">
            <button onclick="markWatered()" class="btn btn-green btn-sm">💧 Đã tưới</button>
            <a href="disease-diagnosis" class="btn btn-outline btn-sm">📷 Chẩn đoán bệnh</a>
            <a href="ai-chat" class="btn btn-gray btn-sm">🤖 Hỏi AI</a>
          </div>
        </div>

        <div class="health-card">
          <h3 style="font-weight:700;margin-bottom:1rem;">Gợi ý từ AI</h3>
          <ul style="list-style:none;padding:0;">
            ${p.status==='danger'
              ? '<li style="display:flex;gap:.5rem;margin-bottom:.5rem;font-size:.875rem;"><span>🔴</span><span>Tưới nước ngay lập tức, cây đang thiếu nước trầm trọng</span></li><li style="display:flex;gap:.5rem;font-size:.875rem;"><span>🟡</span><span>Di chuyển cây đến nơi có nhiều ánh sáng hơn</span></li>'
              : p.status==='warning'
              ? '<li style="display:flex;gap:.5rem;margin-bottom:.5rem;font-size:.875rem;"><span>🟡</span><span>Tưới nước trong vòng 2 giờ tới để tránh cây héo</span></li><li style="display:flex;gap:.5rem;font-size:.875rem;"><span>🟢</span><span>Ánh sáng và dinh dưỡng đang ở mức tốt</span></li>'
              : '<li style="display:flex;gap:.5rem;margin-bottom:.5rem;font-size:.875rem;"><span>🟢</span><span>Cây đang phát triển tốt, tiếp tục chế độ chăm sóc hiện tại</span></li><li style="display:flex;gap:.5rem;font-size:.875rem;"><span>💚</span><span>Dự kiến ra hoa/thu hoạch trong 2-3 tuần</span></li>'}
          </ul>
        </div>`;
    }

    function markWatered() {
      MY_PLANTS[currentIdx].water = Math.min(100, MY_PLANTS[currentIdx].water + 30);
      MY_PLANTS[currentIdx].lastWatered = 'Vừa xong';
      showPlant(currentIdx, null);
      showToast('Đã cập nhật: vừa tưới ' + MY_PLANTS[currentIdx].name);
    }

    renderChips();
    showPlant(0, null);
  </script>
</body>
</html>
