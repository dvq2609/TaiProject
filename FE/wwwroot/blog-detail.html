<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài viết - VƯƠN</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .article-body p { margin-bottom:1rem; line-height:1.7; color:#374151; }
    .article-body h2 { font-size:1.2rem; font-weight:700; margin:1.5rem 0 .75rem; color:#111827; }
    .article-body ul { padding-left:1.5rem; margin-bottom:1rem; }
    .article-body li { margin-bottom:.4rem; line-height:1.6; color:#374151; }
    .article-tag { display:inline-block; padding:.25rem .75rem; background:#f0fdf4; color:#16a34a; border-radius:2rem; font-size:.75rem; font-weight:500; margin-right:.5rem; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <div class="page-content" style="max-width:750px;">
    <a href="blog" style="display:inline-flex;align-items:center;gap:.25rem;color:#6b7280;text-decoration:none;font-size:.875rem;margin-bottom:1rem;">‹ Quay lại Blog</a>
    <div id="article-content">
      <div style="text-align:center;padding:3rem;color:#9ca3af;">Đang tải...</div>
    </div>
  </div>
  <div id="mobile-nav"></div>
  <footer id="site-footer"></footer>
  <script src="assets/common.js"></script>
  <script>
    const id = getParam('id');
    const post = BLOG_POSTS.find(p=>p.id==id) || BLOG_POSTS[0];

    const FULL_CONTENT = {
      default: `
        <p>Trồng cây tại nhà không chỉ mang lại nguồn thực phẩm sạch mà còn giúp bạn thư giãn sau những giờ làm việc căng thẳng. Với bộ kit thông minh của VƯƠN, bạn không cần kiến thức chuyên sâu để bắt đầu.</p>
        <h2>Tại sao nên trồng cây tại nhà?</h2>
        <p>Theo nhiều nghiên cứu, việc chăm sóc cây xanh mỗi ngày giúp giảm mức độ căng thẳng đáng kể. Bạn cũng kiểm soát được nguồn thực phẩm, tránh rau củ có hóa chất bảo vệ thực vật.</p>
        <ul>
          <li>Tiết kiệm chi phí mua rau mỗi tuần</li>
          <li>Đảm bảo an toàn thực phẩm cho gia đình</li>
          <li>Tạo không gian xanh tươi trong nhà</li>
          <li>Thư giãn và giải tỏa căng thẳng</li>
        </ul>
        <h2>Bắt đầu như thế nào?</h2>
        <p>Với bộ kit của VƯƠN, bạn chỉ cần mở hộp, đổ nước vào viên nén xơ dừa, gieo hạt và đặt ở nơi có ánh sáng. Ứng dụng AI sẽ nhắc bạn tưới nước và chăm sóc đúng lịch.</p>
        <p>Kết quả đầu tiên thường xuất hiện sau 3-7 ngày khi hạt bắt đầu nảy mầm. Đây là khoảnh khắc hạnh phúc nhất của người trồng cây!</p>
      `
    };

    document.getElementById('article-content').innerHTML = `
      <div style="margin-bottom:2rem;">
        <div style="font-size:4rem;text-align:center;margin-bottom:1rem;">${post.emoji||'🌱'}</div>
        <span class="article-tag">${post.category==='guide'?'Hướng dẫn':post.category==='tips'?'Mẹo vặt':post.category==='story'?'Câu chuyện':'Tin tức'}</span>
        <h1 style="font-size:1.75rem;font-weight:800;line-height:1.3;margin:.75rem 0 .5rem;">${post.title}</h1>
        <div style="display:flex;gap:1rem;color:#9ca3af;font-size:.8rem;margin-bottom:1.5rem;">
          <span>📅 ${post.date}</span>
          <span>⏱ ${post.readTime||'5 phút đọc'}</span>
          <span>✍️ VƯƠN Team</span>
        </div>
        <p style="font-size:1rem;color:#6b7280;font-style:italic;border-left:3px solid #16a34a;padding-left:1rem;margin-bottom:1.5rem;">${post.summary}</p>
      </div>
      <div class="article-body">${FULL_CONTENT[post.id]||FULL_CONTENT.default}</div>
      <div style="border-top:1px solid #f3f4f6;margin-top:2rem;padding-top:1.5rem;">
        <h2 style="font-weight:700;margin-bottom:1rem;">Bài viết liên quan</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">
          ${BLOG_POSTS.filter(p=>p.id!=id).slice(0,3).map(p=>`
            <a href="blog-detail?id=${p.id}" style="text-decoration:none;color:inherit;">
              <div style="background:#fff;border-radius:.5rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.07);">
                <div style="font-size:1.5rem;margin-bottom:.5rem;">${p.emoji||'🌱'}</div>
                <p style="font-size:.8rem;font-weight:600;line-height:1.4;color:#374151;">${p.title}</p>
              </div>
            </a>`).join('')}
        </div>
      </div>`;
  </script>
</body>
</html>
