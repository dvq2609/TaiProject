<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhật ký trồng cây - VƯƠN</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .journal-entry { background:#fff; border-radius:.75rem; box-shadow:0 1px 3px rgba(0,0,0,.07); padding:1.25rem; margin-bottom:1rem; border-left:3px solid #16a34a; }
    .journal-date { font-size:.75rem; color:#9ca3af; margin-bottom:.5rem; }
    .emoji-picker { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.75rem; }
    .emoji-btn { padding:.35rem .6rem; border:1px solid #e5e7eb; border-radius:.375rem; background:#fff; cursor:pointer; font-size:1.1rem; }
    .emoji-btn.active { border-color:#16a34a; background:#f0fdf4; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <div class="page-content" style="max-width:700px;">
    <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:.5rem;">Nhật ký trồng cây</h1>
    <p style="color:#6b7280;margin-bottom:1.5rem;">Ghi lại hành trình trồng cây của bạn mỗi ngày</p>

    <!-- Write entry -->
    <div class="card card-pad" style="margin-bottom:1.5rem;">
      <h2 style="font-weight:700;margin-bottom:1rem;">Ghi nhật ký hôm nay</h2>
      <div class="form-group">
        <label>Loại cây</label>
        <select id="plant-name" class="form-control">
          <option>Cà chua bi</option>
          <option>Rau cải xanh</option>
          <option>Hoa hồng</option>
          <option>Húng quế</option>
          <option>Cây khác</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tâm trạng cây hôm nay</label>
        <div class="emoji-picker" id="mood-picker">
          <button class="emoji-btn active" data-mood="🌱" onclick="selectMood(this)">🌱 Nảy mầm</button>
          <button class="emoji-btn" data-mood="🌿" onclick="selectMood(this)">🌿 Khỏe mạnh</button>
          <button class="emoji-btn" data-mood="🌸" onclick="selectMood(this)">🌸 Ra hoa</button>
          <button class="emoji-btn" data-mood="🍅" onclick="selectMood(this)">🍅 Ra trái</button>
          <button class="emoji-btn" data-mood="😟" onclick="selectMood(this)">😟 Lo lắng</button>
          <button class="emoji-btn" data-mood="💧" onclick="selectMood(this)">💧 Vừa tưới</button>
        </div>
      </div>
      <div class="form-group">
        <label>Ghi chú</label>
        <textarea id="journal-text" class="form-control" rows="3" placeholder="Hôm nay cây của bạn như thế nào? Có gì đặc biệt không?"></textarea>
      </div>
      <button onclick="addEntry()" class="btn btn-green">📝 Lưu nhật ký</button>
    </div>

    <!-- Entries -->
    <h2 style="font-weight:700;margin-bottom:1rem;">Nhật ký gần đây</h2>
    <div id="entries-list"></div>
  </div>
  <div id="mobile-nav"></div>
  <footer id="site-footer"></footer>
  <script src="assets/common.js"></script>
  <script>
    let entries = JSON.parse(localStorage.getItem('vuon_journal')||'[]');
    let selectedMood = '🌱';
    if(entries.length===0) {
      entries = [
        { id:1, plant:'Cà chua bi', mood:'🌿', text:'Cây cao thêm 2cm so với tuần trước, lá xanh mướt. Rất vui!', date:'14/06/2026', time:'07:30' },
        { id:2, plant:'Rau cải xanh', mood:'💧', text:'Đã tưới nước buổi sáng, thêm chút phân hữu cơ. Cây trông có vẻ cần thêm ánh sáng.', date:'13/06/2026', time:'08:00' },
        { id:3, plant:'Hoa hồng', mood:'🌸', text:'Cây bắt đầu xuất hiện nụ hoa đầu tiên! Mừng lắm, đã chăm sóc 3 tháng rồi.', date:'12/06/2026', time:'18:00' }
      ];
    }

    function selectMood(btn) {
      document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedMood = btn.dataset.mood;
    }

    function addEntry() {
      const plant = document.getElementById('plant-name').value;
      const text = document.getElementById('journal-text').value.trim();
      if(!text) { showToast('Vui lòng nhập nội dung nhật ký', 'error'); return; }
      const now = new Date();
      entries.unshift({
        id: Date.now(), plant, mood: selectedMood, text,
        date: now.toLocaleDateString('vi-VN'),
        time: now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'})
      });
      localStorage.setItem('vuon_journal', JSON.stringify(entries));
      document.getElementById('journal-text').value = '';
      renderEntries();
      showToast('Đã lưu nhật ký!');
    }

    function deleteEntry(id) {
      entries = entries.filter(e=>e.id!==id);
      localStorage.setItem('vuon_journal', JSON.stringify(entries));
      renderEntries();
    }

    function renderEntries() {
      const el = document.getElementById('entries-list');
      if(entries.length===0) { el.innerHTML='<p style="text-align:center;color:#9ca3af;padding:2rem;">Chưa có nhật ký nào</p>'; return; }
      el.innerHTML = entries.map(e=>`
        <div class="journal-entry">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <span style="font-size:1.25rem;">${e.mood}</span>
              <span style="font-weight:600;margin-left:.5rem;">${e.plant}</span>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem;">
              <span class="journal-date">${e.date} ${e.time}</span>
              <button onclick="deleteEntry(${e.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:.8rem;">✕</button>
            </div>
          </div>
          <p style="font-size:.9rem;color:#374151;margin-top:.5rem;line-height:1.5;">${e.text}</p>
        </div>`).join('');
    }

    renderEntries();
  </script>
</body>
</html>
