<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hướng dẫn chăm sóc - VƯƠN</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .guide-card { background:#fff; border-radius:.75rem; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:1.5rem; }
    .guide-step { display:flex; gap:1rem; margin-bottom:1.25rem; align-items:flex-start; }
    .step-num { width:32px; height:32px; background:#16a34a; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
    .plant-btn { padding:.5rem 1rem; border:1px solid #e5e7eb; border-radius:.5rem; background:#fff; cursor:pointer; font-size:.875rem; transition:all .2s; }
    .plant-btn.active { border-color:#16a34a; background:#f0fdf4; color:#16a34a; font-weight:500; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <div class="page-content" style="max-width:800px;">
    <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:.5rem;">Hướng dẫn chăm sóc cây</h1>
    <p style="color:#6b7280;margin-bottom:1.5rem;">Hướng dẫn chi tiết được AI cá nhân hóa cho từng loại cây</p>

    <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;" id="plant-tabs">
      ${['Cà chua bi','Rau cải xanh','Hoa hồng','Húng quế','Hoa oải hương'].map((p,i)=>
        `<button class="plant-btn${i===0?' active':''}" onclick="showGuide('${p}',this)">${p}</button>`).join('')}
    </div>

    <div id="guide-content"></div>
  </div>
  <div id="mobile-nav"></div>
  <footer id="site-footer"></footer>
  <script src="assets/common.js"></script>
  <script>
    const GUIDES = {
      'Cà chua bi': { icon:'🍅', diff:'Trung bình', steps:['Chuẩn bị chậu sâu 30cm, đất giàu dinh dưỡng','Gieo hạt sâu 1-2cm, khoảng cách 15cm','Tưới nhẹ, đặt ở nơi có 6-8h nắng/ngày','Bón phân NPK sau 2 tuần','Cắm cọc khi cây cao 20cm','Thu hoạch sau 60-80 ngày'], water:'2 lần/ngày (sáng 6-7h, chiều 17-18h)', light:'6-8h/ngày', fertilize:'Mỗi 2 tuần', harvest:'60-80 ngày' },
      'Rau cải xanh': { icon:'🥬', diff:'Dễ', steps:['Gieo hạt vào đất ẩm, sâu 0.5cm','Tưới nhẹ ngay sau khi gieo','Bổ sung phân hữu cơ sau 1 tuần','Mỏng thưa khi cây cao 5cm','Thu hoạch khi lá đủ lớn (25-30 ngày)'], water:'2 lần/ngày', light:'4-6h/ngày', fertilize:'1 lần/tuần', harvest:'25-30 ngày' },
      'Hoa hồng': { icon:'🌹', diff:'Khó', steps:['Trồng vào đất thoát nước tốt','Cắt tỉa cành khô và cành yếu','Tưới vào gốc, tránh làm ướt hoa','Bón phân chuyên cho hoa tháng/lần','Kiểm tra sâu bệnh định kỳ'], water:'1 lần/ngày (buổi sáng)', light:'6h/ngày', fertilize:'1 lần/tháng', harvest:'Hoa nở sau 8-12 tuần' },
      'Húng quế': { icon:'🌿', diff:'Dễ', steps:['Gieo hạt hoặc trồng cây con','Đặt gần cửa sổ có ánh nắng','Cắt ngọn thường xuyên để kích thích mọc nhánh','Thu hoạch lá non để dùng'], water:'1 lần/ngày', light:'4-6h/ngày', fertilize:'2 tuần/lần', harvest:'Liên tục sau 4 tuần' },
      'Hoa oải hương': { icon:'💜', diff:'Dễ', steps:['Trồng đất khô, thoát nước tốt','Không tưới quá nhiều - chịu hạn tốt','Cắt tỉa sau khi hoa tàn','Thu hoa khi 1/3 hoa đã nở'], water:'3 ngày/lần', light:'6h+/ngày', fertilize:'1 lần/tháng', harvest:'Mùa hoa tháng 5-8' }
    };

    function showGuide(name, btn) {
      document.querySelectorAll('.plant-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const g = GUIDES[name];
      if(!g) return;
      document.getElementById('guide-content').innerHTML = `
        <div class="guide-card">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
            <span style="font-size:2.5rem;">${g.icon}</span>
            <div>
              <h2 style="font-size:1.25rem;font-weight:700;">${name}</h2>
              <span class="badge ${g.diff==='Dễ'?'badge-green':g.diff==='Trung bình'?'badge-yellow':'badge-red'}">${g.diff}</span>
            </div>
          </div>

          <div class="grid-4" style="margin-bottom:1.5rem;gap:.75rem;">
            ${[['💧','Tưới nước',g.water],['☀️','Ánh sáng',g.light],['🌱','Phân bón',g.fertilize],['🌾','Thu hoạch',g.harvest]].map(([e,l,v])=>`
              <div style="background:#f0fdf4;border-radius:.5rem;padding:.75rem;text-align:center;">
                <div style="font-size:1.25rem;">${e}</div>
                <div style="font-size:.75rem;color:#6b7280;">${l}</div>
                <div style="font-size:.8rem;font-weight:500;color:#166534;margin-top:.25rem;">${v}</div>
              </div>`).join('')}
          </div>

          <h3 style="font-weight:700;margin-bottom:1rem;">Các bước thực hiện</h3>
          ${g.steps.map((s,i)=>`
            <div class="guide-step">
              <div class="step-num">${i+1}</div>
              <p style="font-size:.9rem;color:#374151;padding-top:.3rem;">${s}</p>
            </div>`).join('')}

          <div class="alert alert-info" style="margin-top:1rem;">
            🤖 Hỏi AI để được tư vấn chi tiết hơn về ${name}
            <a href="ai-chat" style="color:#2563eb;display:block;margin-top:.5rem;">→ Chat với AI ngay</a>
          </div>
        </div>`;
    }

    showGuide('Cà chua bi', document.querySelector('.plant-btn.active'));
  </script>
</body>
</html>
